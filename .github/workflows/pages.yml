on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: pandoc/actions/setup@v1
      - run: make posts
      - uses: actions/upload-pages-artifact@v5.0.0
      - uses: actions/deploy-pages@v5
